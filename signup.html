<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up – PulseOne</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f9fafb;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 60px;
  background:#fff;
  border-bottom:1px solid #eee;
}

.logo{
  font-weight:700;
  font-size:18px;
}
.logo span{
  color:#4caf7d;
}

/* MAIN */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:calc(100vh - 70px);
}

/* BOX */
.signup-box{
  background:#fff;
  padding:60px;
  width:380px;
  border-radius:14px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
  text-align:center;
}

.signup-box h2{
  margin-bottom:10px;
}

.signup-box p{
  font-size:14px;
  color:#666;
  margin-bottom:25px;
}

/* INPUT */
.input-group{
  text-align:left;
  margin-bottom:20px;
}

.input-group label{
  font-size:16px;
  font-weight:600;
  display:block;
  margin-bottom:8px;
}

.input-group input{
  width:100%;
  padding:12px 14px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
  box-sizing:border-box;
}

.input-group input:focus{
  outline:none;
  border-color:#4caf7d;
}

/* PASSWORD BOX */
.password-box{
  position:relative;
}

.password-box input{
  padding-right:45px;
}

.toggle-eye{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  user-select:none;
  color:#666;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  background:#4caf7d;
  color:#fff;
  font-weight:600;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.btn:hover{
  background:#3d9e6e;
}

/* EXTRA */
.extra{
  margin-top:16px;
  font-size:13px;
  color:#666;
}

.extra a{
  color:#4caf7d;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Pulse<span>One</span></div>
</nav>

<div class="container">
  <div class="signup-box">

    <h2>Create Account 🚀</h2>
    <p>Join PulseOne and manage healthcare smarter</p>

    <form>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <label>Password</label>
        <div class="password-box">
          <input type="password" id="password" placeholder="Create password" required>
          <span class="toggle-eye" onclick="togglePassword('password',this)">👁️</span>
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="input-group">
        <label>Confirm Password</label>
        <div class="password-box">
          <input type="password" id="confirmPassword" placeholder="Confirm password" required>
          <span class="toggle-eye" onclick="togglePassword('confirmPassword',this)">👁️</span>
        </div>
      </div>

      <button class="btn">Sign Up</button>

    </form>

    <div class="extra">
      Already have an account? <a href="login.html">Login</a>
    </div>

  </div>
</div>

<script>
function togglePassword(id, icon){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    icon.textContent = "🙈";
  }else{
    input.type = "password";
    icon.textContent = "👁️";
  }
}
</script>

</body>
</html>
