<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – PulseOne</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f9fafb;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 60px;
  background: #fff;
  border-bottom: 1px solid #eee;
}

.logo {
  font-weight: 700;
  font-size: 18px;
}
.logo span {
  color: #4caf7d;
}

/* MAIN */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: calc(100vh - 70px);
}

/* LOGIN CARD */
.login-box {
  background: #fff;
  padding: 40px;
  width: 350px;
  border-radius: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.login-box h2 {
  margin-bottom: 10px;
  font-weight: 700;
}

.login-box p {
  font-size: 14px;
  color: #666;
  margin-bottom: 25px;
}

/* INPUT */
.input-group {
  text-align: left;
  margin-bottom: 16px;
}

.input-group label {
  font-size: 18px;
  font-weight: 500;
  display: block;
  margin-bottom: 6px;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.input-group input:focus {
  outline: none;
  border-color: #4caf7d;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  background: #4caf7d;
  color: #fff;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

.btn:hover {
  background: #3d9e6e;
}

/* EXTRA */
.extra {
  margin-top: 16px;
  font-size: 13px;
  color: #666;
}

.extra a {
  color: #4caf7d;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">Pulse<span>One</span></div>
</nav>

<!-- LOGIN -->
<div class="container">
  <div class="login-box">
    <h2>Welcome Back 👋</h2>
    <p>Login to your PulseOne account</p>

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button class="btn">Login</button>
    </form>

    <div class="extra">
      Forgot password? <a href="#">Reset</a><br><br>
      Don’t have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>
</div>

</body>
</html>
